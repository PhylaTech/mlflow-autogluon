name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# shared with the Release Please workflow: everything that pushes to
# gh-pages must be serialized or the pushes race and get rejected
concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e .[docs]
      - run: mkdocs build --strict
      - name: Deploy dev docs version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # retry with a fresh gh-pages in case another workflow pushed
          # between our fetch and push
          for attempt in 1 2 3; do
            git fetch origin +gh-pages:gh-pages || true
            mike deploy --push dev && break
            if [ "$attempt" = 3 ]; then exit 1; fi
            sleep $((attempt * 15))
          done
