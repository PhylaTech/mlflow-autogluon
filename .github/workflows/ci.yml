name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check mlflow_autogluon tests

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        mlflow-version: [""]
        include:
          # oldest supported MLflow line
          - python-version: "3.11"
            mlflow-version: "mlflow<3"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e .[tabular,test]
      - if: matrix.mlflow-version != ''
        run: pip install "${{ matrix.mlflow-version }}"
      - run: pytest

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # all predictor extras so every registry branch is reachable;
      # setuptools<81 still ships pkg_resources for autogluon.multimodal
      - run: pip install -e .[tabular,timeseries,multimodal,test] "setuptools<81" coverage-badge
      - run: pytest --cov=mlflow_autogluon --cov-report=term-missing --cov-fail-under=100
        timeout-minutes: 30
      - name: Generate coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir badge-out
          coverage-badge -o badge-out/coverage.svg
      - name: Publish badge to gh-pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: badge-out
          target-folder: badges
          branch: gh-pages
          clean: false

  test-timeseries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e .[tabular,timeseries,test]
      - run: pytest tests/test_timeseries.py -v

  test-multimodal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # setuptools<81 still ships pkg_resources, which autogluon.multimodal's
      # dependency chain imports at runtime
      - run: pip install -e .[tabular,multimodal,test] "setuptools<81"
      - run: pytest tests/test_multimodal.py -v
        timeout-minutes: 30
