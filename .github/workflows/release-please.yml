name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  actions: write

# shared with the Docs workflow: everything that pushes to gh-pages
# must be serialized or the pushes race and get rejected
concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      # a release created with GITHUB_TOKEN does not emit a
      # workflow-triggering release event, so dispatch the publish
      # workflow explicitly (dispatch is exempt from recursion prevention)
      - if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run publish-pypi.yml --repo ${{ github.repository }} --ref ${{ steps.release.outputs.tag_name }}

      # publish the versioned documentation for this release and point
      # the "latest" alias (the site default) at it
      - if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag_name }}
          fetch-depth: 0
      - if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - if: ${{ steps.release.outputs.release_created }}
        run: pip install -e .[docs]
      - if: ${{ steps.release.outputs.release_created }}
        name: Deploy versioned docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          version="${{ steps.release.outputs.tag_name }}"
          # retry with a fresh gh-pages in case another workflow pushed
          # between our fetch and push
          for attempt in 1 2 3; do
            git fetch origin +gh-pages:gh-pages || true
            if mike deploy --push --update-aliases "${version#v}" latest &&
               mike set-default --push latest; then
              break
            fi
            if [ "$attempt" = 3 ]; then exit 1; fi
            sleep $((attempt * 15))
          done
