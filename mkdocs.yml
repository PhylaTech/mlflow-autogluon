site_name: mlflow-autogluon
site_description: MLflow community model flavor and autologging for AutoGluon
site_url: https://phylatech.github.io/mlflow-autogluon/
repo_url: https://github.com/PhylaTech/mlflow-autogluon
repo_name: PhylaTech/mlflow-autogluon

extra:
  version:
    provider: mike
    default: latest

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Autologging: autologging.md
  - Model flavor: model-flavor.md
  - Serving: serving.md
  - API reference: api.md
  - Contributing: contributing.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - tables
