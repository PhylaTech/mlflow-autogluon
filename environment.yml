name: mlflow-autogluon
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      - mlflow>=2.15
      - autogluon.tabular>=1.1
      - autogluon.timeseries>=1.1
      - autogluon.multimodal>=1.1
      # autogluon.multimodal's dependency chain imports pkg_resources,
      # which newer setuptools no longer ships
      - setuptools<81
      - pytest>=7.0
      - pytest-cov>=4.0
      - ruff>=0.4
      - mkdocs-material>=9.5
      - mkdocstrings[python]>=0.25
